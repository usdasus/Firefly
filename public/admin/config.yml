backend:
  name: github
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "zh_Hans"

publish_mode: editorial_workflow

slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"

    folder: "src/content/posts"

    create: true
    delete: true
    editor:
      preview: true

    extension: "md"
    format: "frontmatter"

    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    summary: "{{title}} | {{published}}"

    fields:
      - label: "标题"
        name: "title"
        widget: "string"

      - label: "发布日期"
        name: "published"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "简介"
        name: "description"
        widget: "text"
        required: false

      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true

      - label: "分类"
        name: "category"
        widget: "select"
        options:
          - 杂文
          - 游戏
          - 技术
          - 动漫
          - 音乐
          - 生活
          - 学习
          - 其它

      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false

      - label: "正文"
        name: "body"
        widget: "markdown"