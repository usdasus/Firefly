backend:
  name: github
  repo: usdasus/Firefly
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: "https://eloquent-mousse-ecf2a3.netlify.app"
display_url: "https://eloquent-mousse-ecf2a3.netlify.app"

locale: "zh_Hans"

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"

    folder: "src/content/posts"
    create: true
    delete: true

    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"

    fields:
      - { label: "标题", name: "title", widget: "string" }

      - label: "发布日期"
        name: "published"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "更新时间"
        name: "updated"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - { label: "简介", name: "description", widget: "text", required: false }

      - label: "封面图片"
        name: "image"
        widget: "image"
        required: false

      - label: "标签"
        name: "tags"
        widget: "list"
        required: false

      - { label: "分类", name: "category", widget: "string", required: false }

      - { label: "语言", name: "lang", widget: "string", required: false }

      - { label: "作者", name: "author", widget: "string", required: false }

      - { label: "文章来源", name: "sourceLink", widget: "string", required: false }

      - { label: "许可证名称", name: "licenseName", widget: "string", required: false }

      - { label: "许可证链接", name: "licenseUrl", widget: "string", required: false }

      - { label: "草稿", name: "draft", widget: "boolean", default: false }

      - { label: "置顶", name: "pinned", widget: "boolean", default: false }

      - { label: "允许评论", name: "comment", widget: "boolean", default: true }

      - label: "文章密码"
        name: "password"
        widget: "string"
        required: false

      - label: "密码提示"
        name: "passwordHint"
        widget: "string"
        required: false

      - label: "正文"
        name: "body"
        widget: "markdown"