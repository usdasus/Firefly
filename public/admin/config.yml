backend:
  name: github
  repo: usdasus/Firefly
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: posts
    label: 文章
    folder: src/content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - label: 标题
        name: title
        widget: string

      - label: 发布时间
        name: published
        widget: datetime

      - label: 描述
        name: description
        widget: text
        required: false

      - label: 标签
        name: tags
        widget: list
        required: false

      - label: 分类
        name: category
        widget: string
        required: false

      - label: 草稿
        name: draft
        widget: boolean
        default: false

      - label: 正文
        name: body
        widget: markdown